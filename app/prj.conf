CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=n
CONFIG_REBOOT=y

# Lightweight custom command parser instead of the Zephyr shell subsystem: the shell
# took up 39%/38% of RAM/Flash for four trivial LED commands - disproportionate on an
# 8 KB-RAM device. console_getchar() is Zephyr's built-in pull-style, character-by-
# character input API; the app's own cmd_parser.c builds line editing and bash-style
# history recall on top of it (console_getline()'s line-buffered mode can't do
# history - Zephyr's console driver silently drops Up/Down arrow escape sequences).
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETCHAR=y

# Fixed kernel baseline trimmed too (ISR stack 2048 B default, main stack 1024 B
# default). ISR_STACK_SIZE is shared globally by ALL interrupts + kernel init -
# riskier to cut than the shell stack, since an overflow is more likely to silently
# corrupt memory than fault cleanly. Verified stable via a pyserial stress test
# (10 ms blink timer running concurrently with 15 rapid "help" calls, the app's
# deepest printk call path) - see RUNBOOK.md Step 7 for details. RAM saved: 52.25% ->
# 33.50%.
CONFIG_ISR_STACK_SIZE=1024
CONFIG_MAIN_STACK_SIZE=512

# Thread introspection for the "threads" console command (k_thread_foreach +
# live stack usage). THREAD_MONITOR maintains the runtime thread list;
# THREAD_NAME stores names (MAX_NAME_LEN trimmed to fit "adc_stream_tid");
# THREAD_STACK_INFO + INIT_STACKS give an accurate used-stack count (INIT_STACKS
# fills each stack with a pattern at init so unused bytes can be counted).
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MAX_NAME_LEN=16
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y

# Software stack-overflow detection. This Cortex-M0+ has no MPU, so the
# hardware option (CONFIG_HW_STACK_PROTECTION) is unavailable; the sentinel is
# the software fallback: a magic value at the bottom of each thread stack,
# checked at every context switch and on ISRs. If a thread overflows past it,
# the kernel raises a fatal error (K_ERR_STACK_CHK_FAIL) naming that thread
# instead of silently corrupting memory. Costs 4 B/stack + the periodic checks.
CONFIG_STACK_SENTINEL=y
