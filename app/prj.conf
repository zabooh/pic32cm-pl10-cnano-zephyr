CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=n

# Lightweight custom command parser instead of the Zephyr shell subsystem: the shell
# took up 39%/38% of RAM/Flash for four trivial LED commands - disproportionate on an
# 8 KB-RAM device. console_getline() is Zephyr's built-in lightweight pull-style
# line-reading API (no thread/stack of its own like the shell, runs in the caller's
# thread).
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETLINE=y

# Fixed kernel baseline trimmed too (ISR stack 2048 B default, main stack 1024 B
# default). ISR_STACK_SIZE is shared globally by ALL interrupts + kernel init -
# riskier to cut than the shell stack, since an overflow is more likely to silently
# corrupt memory than fault cleanly. Verified stable via a pyserial stress test
# (10 ms blink timer running concurrently with 15 rapid "help" calls, the app's
# deepest printk call path) - see RUNBOOK.md Step 7 for details. RAM saved: 52.25% ->
# 33.50%.
CONFIG_ISR_STACK_SIZE=1024
CONFIG_MAIN_STACK_SIZE=512
